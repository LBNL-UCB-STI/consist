name: docs
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish docs for, e.g. v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy:
    if: github.event_name != 'release' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies (frozen)
        run: uv sync --frozen --extra docs

      - name: Add venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install mike fork
        run: uv pip install --python .venv/bin/python git+https://github.com/squidfunk/mike.git

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages
        run: git fetch origin gh-pages --depth=1 || true

      - name: Determine docs version
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import tomllib
          from pathlib import Path
          import os

          with Path("pyproject.toml").open("rb") as handle:
              package_version = tomllib.load(handle)["project"]["version"]

          raw_tag = os.environ["RELEASE_TAG"]
          docs_version = raw_tag.removeprefix("v")

          if docs_version != package_version:
              raise SystemExit(
                  "Release tag / package version mismatch: "
                  f"tag={raw_tag!r}, pyproject={package_version!r}"
              )

          print(f"DOCS_VERSION={docs_version}")
          PY
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

      - name: Deploy versioned docs
        run: .venv/bin/mike deploy --push --update-aliases "${DOCS_VERSION}" latest

      - name: Set default docs version
        run: .venv/bin/mike set-default --push latest
